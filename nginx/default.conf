server {
    listen 80;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/javascript application/json
        application/octet-stream font/woff2 font/woff;

    # ── Static assets: cache 7 days in browser ──────────────────────────────
    location /static/ {
        proxy_pass http://streamlit:8501/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket (Streamlit live updates) ──────────────────────────────────
    location /_stcore/stream {
        proxy_pass http://streamlit:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Everything else ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://streamlit:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
