services:
  streamlit:
    build: .
    container_name: openclaw-ui-streamlit
    restart: unless-stopped
    # No longer exposed directly; nginx is the entry point
    expose:
      - "8501"
    volumes:
      - ./app.py:/app/app.py:ro
      - ${OPENCLAW_SESSIONS_DIR:-/volume1/UserFolder/shudawei/.openclaw/agents/main/sessions}:/sessions:ro
      - ${OPENCLAW_CRON_DIR:-/volume1/UserFolder/shudawei/.openclaw/cron/runs}:/cron-runs:ro
    environment:
      - LOG_DIR=/sessions
      - EXTRA_LOG_DIR=/cron-runs
      - AUTO_REFRESH_INTERVAL=5
    user: "${UID:-1000}:${GID:-1000}"

  nginx:
    image: nginx:alpine
    container_name: openclaw-ui
    restart: unless-stopped
    ports:
      - "8501:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - streamlit
